<!-- Mostrar alertas mejoradas -->
<?php function mostrarAlerta($tipo, $mensaje) { ?>
    <div class="alerta-custom position-fixed top-0 start-50 translate-middle-x col-6 mt-3">
        <div class="alert alert-<?= $tipo ?> alert-dismissible fade show shadow" role="alert">
            <strong>Información: </strong> <?= $mensaje ?>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>
<?php } ?>
